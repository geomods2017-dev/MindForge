workflows:
  ios-workflow:
    name: iOS Build
    environment:
      xcode: latest

    scripts:
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "MindForge.xcodeproj" \
            --scheme "MindForge" \
            --archive-method development

    artifacts:
      - build/ios/ipa/*.ipa
