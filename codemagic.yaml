workflows:
  ios-workflow:
    name: iOS Build
    environment:
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          echo "No dependencies"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "MindForge.xcodeproj" \
            --scheme "MindForge"

    artifacts:
      - build/ios/ipa/*.ipa
