workflows:
  ios-workflow:
    name: iOS Build

    environment:
      xcode: latest

    scripts:
      - name: Build IPA (force no export plist)
        script: |
          xcode-project build-ipa \
            --project "MindForge.xcodeproj" \
            --scheme "MindForge" \
            --no-use-profiles

    artifacts:
      - build/ios/ipa/*.ipa
